version: '3.8'

services:
  # Backend API Service
  backend:
    build: ./backend
    container_name: play-for-charity-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  # Frontend Service
  frontend:
    build: ./frontend
    container_name: play-for-charity-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    restart: unless-stopped

